<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Сестра!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
	<link href="https://googleapis.com" rel="stylesheet">

</head>
<body>
    <div id="petals-container"></div>
    
    <div class="container">
        <header class="fade-in">
            <h1>С 8 Марта, Сестра! 🌸</h1>
            <p class="subtitle">Самой крутой и неповторимой</p>
        </header>

        <div class="card fade-in delay-1">
            <div class="card-content">
                <p id="greeting-text">
                    Любимая сестренка! Оставайся всегда такой же яркой, стильной и вдохновляющей. 
                    Пусть каждый твой день будет похож на праздник, а все цели достигаются легко и в кайф!
                </p>
                <button id="wish-btn">Лови предсказание</button>
                <p id="dynamic-wish" class="wish-text"></p>
            </div>
        </div>

        <footer class="fade-in delay-2">
            <p>Твой любимый Брат! ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
